# Exec-OS configuration
# This file is the single source of truth every skill reads FIRST, before doing any work.
# It is a committed TEMPLATE. For machine-specific paths/secrets, copy to
# .exec-os-config.local.yml (gitignored) and the skills will prefer that if present.

version: 1

founder:
  name: "Aron Clementi"
  language: en              # default output language for all skills

# ── Platforms available for canonical storage / scanning ──────────────────────
platforms:
  notion: true              # workspaces organized on Notion
  google_drive: true
  sharepoint: false
  confluence: false
  github: true
  local_fs: true            # local filesystem under scope_paths (workspace-ops)

# ── Cross-repo handoff: exec-os skills pick up founder-os deliverables ──
# Each founder-os company repo is a separate clone. investor-ops Sync mode reads
# their /outputs and metadata. Paths can exist on disk even if not mounted in a
# given Cowork session; skills degrade gracefully when a path is unreachable.
linked_founder_os_repos:
  - path: "/Users/aronclementi/Documents/Claude/Skill Factory/Founder-OS-Repo"
    company: "Founder OS demo"
    company_type: []            # sector overlay(s): saas | hardware | crypto | fintech | ai (list, combinable; [] = base only)
  # - path: "/Users/.../<company>-Founder-OS"
  #   company: "<Company Name>"
  #   company_type: ["ai", "fintech"]

# ── investor-ops Family 1: data room (build & maintain the canonical data room) ─
dataroom:
  platform: notion          # where the canonical data room lives: notion | google_drive | sharepoint | confluence
  root_name: "Data Room"    # name of the canonical root folder/page
  default_company_type: []  # fallback sector overlay(s) if a company has none set; see skills/investor-ops/references/sector-overlays.md
  # Metadata stamped on every synced deliverable (Sync mode):
  metadata_schema:
    - audience              # internal | board | investor | auditor | acquirer
    - lens                  # finance | legal | product | commercial | governance | hr | ip
    - version               # semver or date
    - source_skill          # which founder-os skill produced it
    - sensitivity           # public | confidential | restricted  (see diligence.sensitivity_tiers)
  canonical_structure:      # the synthesized taxonomy; see references/canonical-structure.md
    - "00_Overview"
    - "01_Corporate_&_Governance"
    - "02_Financials"
    - "03_Legal_&_Compliance"
    - "04_IP_Data_&_Security"
    - "05_Team_&_HR"
    - "06_Product_&_Technology"
    - "07_Market_&_Commercial"
    - "08_Cap_Table_&_Financing"
    - "09_Traction_&_Metrics"
    - "99_DD_QA_&_Trackers"

# ── investor-ops Family 3: diligence & delivery (package the room for third parties) ─
diligence:
  # Stage profiles drive which checklist + folder subset applies. Calibrated on
  # SICTIC (seed), Startup Board Academy (governance), Elysium Lab (M&A/exit).
  default_jurisdiction: CH  # Swiss venture context: high-requirement
  stage_profiles:
    - pre_seed
    - seed                  # SICTIC-grade
    - series_a
    - series_b
    - growth
    - m_and_a               # Elysium-grade acquisition/exit
  sensitivity_tiers:        # what can be shown to whom, by data-room access level
    public: "shareable openly (pitch deck, public one-pager)"
    confidential: "NDA-gated (financials, contracts, cap table)"
    restricted: "principals/counsel only (employee PII, litigation, key IP)"
  qa_tracker: true          # maintain a Q&A log + access log during a live process

# ── investor-ops Family 2: investor sourcing & outreach ──────────────────────
# Build the target list, score fit, run outreach, track the raise as a pipeline.
# Full spec: skills/investor-ops/references/investor-sourcing-and-outreach.md
outreach:
  crm_location: "10_Fundraise/Investor_Pipeline"  # living tracker location in the data room
  sources:                  # where the investor list is built from (warm network first)
    - warm_network
    - directories
    - funding_maps
    - portfolio_signals
    - accelerators
  pipeline_stages: [Researched, Contacted, Replied, Meeting, Diligence, Term Sheet, Closed, Passed]
  fit_weights:              # sum to 100; tune per raise
    stage_match: 25
    sector_match: 20
    check_size_match: 15
    geography: 10
    portfolio_fit: 10
    value_add: 10
    warm_path: 10
  update_cadence: monthly   # prospect nurture: weekly | biweekly | monthly | off
  daily_send_cap: 15        # anti-spam guardrail: max new cold contacts per day

# ── workspace-ops: the substrate (organize files & workspaces) ──────────
# Sandbox safety. v1.0 is advice-only (Scan/Advise/Standardize/Onboarding).
# Execute mode (batch moves) lands in v1.1 and obeys every safeguard below.
workspace_ops:
  scope_paths:              # folders the skill may scan / (v1.1) reorganize
    - "/Users/aronclementi/Documents/"
    - "/Users/aronclementi/Library/CloudStorage/GoogleDrive-clementi.aron@gmail.com/My Drive/"
  never_touch:              # absolute blacklist; never read, never move, never touch
    - "/Users/aronclementi/Library/Application Support/"
    - "/Users/aronclementi/Library/Keychains/"
    - "/Users/aronclementi/.ssh/"
  archive_folder_name: "_archive"     # files are MOVED here (never deleted), timestamped
  snapshot_folder_name: "_snapshots"  # pre-action state snapshot for undo
  confirm_batch_over: 5     # explicit confirmation required for batches larger than this

# ── functional-hr-ops: team architecture (counterpart to workspace-ops Architect) ──
# Produces Organization-Model.md, the shared artifact workspace-ops consumes
# to place files and shape information architecture. Owns team/people/org design.
functional_hr_ops:
  organization_model_path: "Organization-Model.md"   # the shared org model doc
  default_operating_model: ""        # optional preference: team-topologies | spotify | functional | divisional | matrix | two-pizza | lean (blank = choose by fit)
  work_modes:                        # default work modes in use
    - remote
    - hybrid
    - onsite
  sites: []                          # offices/locations, e.g. ["Zurich", "Remote-EU"]
  legal_entities: []                 # for multi-entity holdings, e.g. ["Corp", "Foundation"]

preferences:
  visual_artifact: ask      # always | ask | never  (HTML dashboards / visual maps)
  ai_ops_autonomous: on     # allow skills to chain steps without per-step confirmation
  language: en
